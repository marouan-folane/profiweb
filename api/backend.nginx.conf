server {
    listen 80;
    server_name your-api-domain.com; # Replace with your Hostinger domain/IP

    # Increase upload limits for files/PDFs
    client_max_body_size 20M;

    location / {
        proxy_pass http://localhost:2030; # Your API port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard CORS (though handled in app, good to have)
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Serve static uploads directly for better performance
    location /uploads/ {
        alias /var/www/profiweb-api/uploads/; # Adjust path to your actual deployment folder
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
